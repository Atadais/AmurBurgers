<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Amur Burgers — Админ-панель</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #F5F0EB;
            --card: #FFFFFF;
            --olive: #2D4A2E;
            --olive-light: #4A6B4A;
            --olive-dark: #1E331F;
            --gold: #D4A843;
            --gold-light: #E8C86A;
            --dark: #2C1810;
            --text: #2C1810;
            --text-muted: #6B5A4F;
            --shadow: 0 4px 24px rgba(44, 24, 16, 0.08);
            --shadow-hover: 0 8px 40px rgba(44, 24, 16, 0.12);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: all 0.25s ease;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: 0;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--olive);
            border-radius: 10px;
        }

        .login-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(245, 240, 235, 0.92);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-overlay.hidden {
            display: none;
        }

        .login-modal {
            background: var(--card);
            border-radius: var(--radius);
            max-width: 380px;
            width: 100%;
            padding: 40px 32px 32px;
            box-shadow: var(--shadow-hover);
            border: 1px solid rgba(44, 24, 16, 0.06);
            position: relative;
        }
        .login-modal::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gold);
        }
        .login-modal__title {
            font-size: 26px;
            font-weight: 700;
            color: var(--olive-dark);
            text-align: center;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .login-modal__title span {
            color: var(--gold);
        }
        .login-modal__sub {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 24px;
        }
        .login-modal__input {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            background: var(--bg);
            border: 2px solid rgba(44, 24, 16, 0.08);
            color: var(--text);
            font-size: 16px;
            transition: var(--transition);
            margin-bottom: 14px;
        }
        .login-modal__input:focus {
            border-color: var(--gold);
            outline: none;
            background: #fff;
        }
        .login-modal__btn {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-sm);
            background: var(--olive);
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            letter-spacing: 0.3px;
        }
        .login-modal__btn:hover {
            background: var(--olive-dark);
        }
        .login-modal__btn:active {
            transform: scale(0.97);
        }
        .login-modal__error {
            color: #C0392B;
            font-size: 14px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .login-modal__error.show {
            display: block;
        }

        .admin-panel {
            display: none;
            min-height: 100vh;
            padding: 24px 20px 40px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .admin-panel.open {
            display: block;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 14px;
            border-bottom: 3px solid var(--gold);
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .admin-header__title {
            font-size: 28px;
            font-weight: 700;
            color: var(--olive-dark);
            letter-spacing: -0.5px;
        }
        .admin-header__title span {
            color: var(--gold);
        }
        .admin-header__close {
            padding: 8px 20px;
            border-radius: 50px;
            background: var(--bg);
            border: 2px solid rgba(44, 24, 16, 0.08);
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        .admin-header__close:hover {
            border-color: var(--olive);
            color: var(--olive);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--card);
            border-radius: var(--radius-sm);
            padding: 16px 14px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(44, 24, 16, 0.04);
            text-align: center;
            transition: var(--transition);
        }
        .stat-card:hover {
            box-shadow: var(--shadow-hover);
        }
        .stat-card__number {
            font-size: 34px;
            font-weight: 800;
            color: var(--olive);
            line-height: 1.1;
        }
        .stat-card__number.green {
            color: #2E7D32;
        }
        .stat-card__number.orange {
            color: #D4A843;
        }
        .stat-card__label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .filters {
            display: flex;
            gap: 6px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 7px 16px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            background: var(--bg);
            color: var(--text-muted);
            border: 2px solid rgba(44, 24, 16, 0.06);
            cursor: pointer;
            transition: var(--transition);
        }
        .filter-btn.active {
            background: var(--olive);
            color: #fff;
            border-color: var(--olive);
        }
        .filter-btn:hover:not(.active) {
            border-color: var(--olive);
            color: var(--olive);
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .order-card {
            background: var(--card);
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--gold);
            transition: var(--transition);
        }
        .order-card:hover {
            box-shadow: var(--shadow-hover);
        }
        .order-card.new-order {
            border-left-color: #D4A843;
            animation: pulse-border 1.5s ease;
        }
        @keyframes pulse-border {
            0%, 100% { border-left-color: #D4A843; }
            50% { border-left-color: #F1C40F; }
        }

        .order-card__top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 4px;
        }
        .order-card__id {
            font-weight: 700;
            font-size: 15px;
            color: var(--olive);
        }
        .order-card__date {
            font-size: 12px;
            color: var(--text-muted);
        }
        .order-card__type {
            font-size: 11px;
            background: var(--olive-light);
            color: #fff;
            padding: 1px 12px;
            border-radius: 50px;
            display: inline-block;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .order-card__customer {
            font-size: 15px;
            font-weight: 600;
            color: var(--dark);
            margin: 2px 0;
        }
        .order-card__items {
            font-size: 13px;
            color: var(--text-muted);
            margin: 4px 0;
            white-space: pre-line;
        }
        .order-card__total {
            font-weight: 700;
            color: var(--olive);
            font-size: 16px;
            margin: 2px 0;
        }
        .order-card__address {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(44, 24, 16, 0.06);
        }
        .order-card__bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(44, 24, 16, 0.06);
            flex-wrap: wrap;
            gap: 8px;
        }
        .order-card__status {
            font-size: 12px;
            font-weight: 600;
            padding: 3px 14px;
            border-radius: 50px;
            display: inline-block;
        }
        .order-card__status.processing {
            background: rgba(212, 168, 67, 0.15);
            color: #B7950B;
        }
        .order-card__status.accepted {
            background: rgba(46, 125, 50, 0.12);
            color: #2E7D32;
        }
        .order-card__btn {
            padding: 5px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 12px;
            transition: var(--transition);
            border: none;
            background: var(--bg);
            color: var(--text-muted);
            cursor: pointer;
        }
        .order-card__btn:hover {
            background: var(--olive);
            color: #fff;
        }
        .order-card__btn.accept {
            background: var(--olive);
            color: #fff;
        }
        .order-card__btn.accept:hover {
            background: var(--olive-dark);
        }

        .empty-orders {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 0;
            font-size: 16px;
            background: var(--card);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow);
        }

        .notif-banner {
            background: rgba(212, 168, 67, 0.08);
            border: 1px solid rgba(212, 168, 67, 0.15);
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .notif-banner__text {
            font-size: 13px;
            color: var(--text-muted);
        }
        .notif-banner__text strong {
            color: var(--olive);
        }
        .notif-banner__btn {
            padding: 6px 18px;
            border-radius: 50px;
            background: var(--gold);
            color: var(--olive-dark);
            font-weight: 600;
            font-size: 13px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }
        .notif-banner__btn:hover {
            background: var(--gold-light);
        }

        @media (max-width: 600px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .stat-card__number {
                font-size: 26px;
            }
            .admin-header__title {
                font-size: 22px;
            }
            .order-card {
                padding: 14px 14px;
            }
        }

        @media (max-width: 400px) {
            .stats {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .stat-card {
                padding: 12px 10px;
            }
            .stat-card__number {
                font-size: 22px;
            }
            .login-modal {
                padding: 28px 18px 20px;
            }
            .login-modal__title {
                font-size: 20px;
            }
            .order-card__id {
                font-size: 13px;
            }
            .order-card__customer {
                font-size: 14px;
            }
            .order-card__total {
                font-size: 15px;
            }
            .filters {
                gap: 4px;
            }
            .filter-btn {
                padding: 5px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-modal">
            <div class="login-modal__title">Amur <span>Burgers</span></div>
            <div class="login-modal__sub">Введите пароль для доступа</div>
            <input type="password" class="login-modal__input" id="adminPassword" placeholder="Пароль" autocomplete="off">
            <button class="login-modal__btn" id="loginBtn">Войти</button>
            <div class="login-modal__error" id="loginError">Неверный пароль</div>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <div class="admin-header__title">Заказы <span>Amur</span></div>
            <button class="admin-header__close" onclick="goToMain()">На главную</button>
        </div>

        <div class="notif-banner" id="notifBanner">
            <div class="notif-banner__text">
                <strong>Включите уведомления</strong> — оповещения о новых заказах
            </div>
            <button class="notif-banner__btn" id="enableNotifBtn">Включить</button>
        </div>

        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-card__number" id="statTotal">0</div>
                <div class="stat-card__label">Всего</div>
            </div>
            <div class="stat-card">
                <div class="stat-card__number orange" id="statProcessing">0</div>
                <div class="stat-card__label">В обработке</div>
            </div>
            <div class="stat-card">
                <div class="stat-card__number green" id="statAccepted">0</div>
                <div class="stat-card__label">Принято</div>
            </div>
            <div class="stat-card">
                <div class="stat-card__number" id="statToday">0</div>
                <div class="stat-card__label">Сегодня</div>
            </div>
        </div>

        <div class="filters" id="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="processing">В обработке</button>
            <button class="filter-btn" data-filter="accepted">Принятые</button>
            <button class="filter-btn" data-filter="today">Сегодня</button>
            <button class="filter-btn" data-filter="week">Неделя</button>
            <button class="filter-btn" data-filter="month">Месяц</button>
        </div>

        <div class="orders-list" id="ordersList">
            <div class="empty-orders">Заказов пока нет</div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'Amur_amur1@';

        function getOrders() {
            try {
                return JSON.parse(localStorage.getItem('amurOrders')) || [];
            } catch (e) {
                return [];
            }
        }

        function saveOrders(orders) {
            try {
                localStorage.setItem('amurOrders', JSON.stringify(orders));
            } catch (e) {}
        }

        function updateStats(orders) {
            const total = orders.length;
            const processing = orders.filter(o => o.status === 'processing').length;
            const accepted = orders.filter(o => o.status === 'accepted').length;
            const today = new Date().toDateString();
            const todayOrders = orders.filter(o => new Date(o.date).toDateString() === today).length;

            document.getElementById('statTotal').textContent = total;
            document.getElementById('statProcessing').textContent = processing;
            document.getElementById('statAccepted').textContent = accepted;
            document.getElementById('statToday').textContent = todayOrders;
        }

        let currentFilter = 'all';

        function getFilteredOrders(orders, filter) {
            const today = new Date().toDateString();
            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            const monthAgo = new Date();
            monthAgo.setMonth(monthAgo.getMonth() - 1);

            switch (filter) {
                case 'processing':
                    return orders.filter(o => o.status === 'processing');
                case 'accepted':
                    return orders.filter(o => o.status === 'accepted');
                case 'today':
                    return orders.filter(o => new Date(o.date).toDateString() === today);
                case 'week':
                    return orders.filter(o => new Date(o.date) >= weekAgo);
                case 'month':
                    return orders.filter(o => new Date(o.date) >= monthAgo);
                default:
                    return orders;
            }
        }

        function renderOrders() {
            const container = document.getElementById('ordersList');
            const allOrders = getOrders();
            const filtered = getFilteredOrders(allOrders, currentFilter);

            updateStats(allOrders);

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-orders">Заказов пока нет</div>';
                return;
            }

            container.innerHTML = filtered.map(order => `
                <div class="order-card ${order.status === 'processing' ? 'new-order' : ''}">
                    <div class="order-card__top">
                        <span class="order-card__id">Заказ #${String(order.id).slice(-6)}</span>
                        <span class="order-card__date">${new Date(order.date).toLocaleString('ru-RU')}</span>
                    </div>
                    <div>
                        <span class="order-card__type">${order.type === 'delivery' ? 'Доставка' : 'С собой'}</span>
                    </div>
                    <div class="order-card__customer">${order.name} | ${order.phone}</div>
                    <div class="order-card__items">${order.items}</div>
                    <div class="order-card__total">${order.total} ₽</div>
                    ${order.address ? `<div class="order-card__address">${order.address}</div>` : ''}
                    <div class="order-card__bottom">
                        <span class="order-card__status ${order.status}">
                            ${order.status === 'processing' ? 'В обработке' : 'Принят'}
                        </span>
                        ${order.status === 'processing' ? `
                            <button class="order-card__btn accept" onclick="acceptOrder(${order.id})">
                                Принять заказ
                            </button>
                        ` : `
                            <span style="font-size:12px; color:var(--text-muted);">Заказ принят</span>
                        `}
                    </div>
                </div>
            `).join('');
        }

        function acceptOrder(orderId) {
            const orders = getOrders();
            const order = orders.find(o => o.id === orderId);
            if (order) {
                order.status = 'accepted';
                saveOrders(orders);
                renderOrders();
                playNotificationSound();
            }
        }

        function playNotificationSound() {
            try {
                const audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = 880;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.frequency.value = 1100;
                    osc2.type = 'sine';
                    gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                    osc2.start(audioCtx.currentTime);
                    osc2.stop(audioCtx.currentTime + 0.15);
                }, 150);
            } catch (e) {}
        }

        function requestNotificationPermission() {
            if ('Notification' in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        document.getElementById('notifBanner').style.display = 'none';
                        if ('serviceWorker' in navigator) {
                            navigator.serviceWorker.ready.then(reg => {
                                reg.showNotification('Уведомления включены', {
                                    body: 'Вы будете получать оповещения о новых заказах',
                                    icon: 'https://placehold.co/192x192/2D4A2E/FFFFFF?text=AB&font=playfair',
                                    badge: 'https://placehold.co/192x192/2D4A2E/FFFFFF?text=AB&font=playfair',
                                });
                            });
                        }
                    }
                });
            }
        }

        document.getElementById('enableNotifBtn').addEventListener('click', requestNotificationPermission);

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderOrders();
            });
        });

        document.getElementById('loginBtn').addEventListener('click', function() {
            const password = document.getElementById('adminPassword').value.trim();
            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('adminPanel').classList.add('open');
                renderOrders();
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('/sw.js').catch(() => {});
                }
                if ('Notification' in window && Notification.permission === 'granted') {
                    document.getElementById('notifBanner').style.display = 'none';
                }
            } else {
                document.getElementById('loginError').classList.add('show');
                document.getElementById('adminPassword').value = '';
                document.getElementById('adminPassword').focus();
            }
        });

        document.getElementById('adminPassword').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });

        let lastOrderCount = 0;

        function checkNewOrders() {
            const orders = getOrders();
            const processingCount = orders.filter(o => o.status === 'processing').length;
            if (processingCount > lastOrderCount) {
                playNotificationSound();
                if ('Notification' in window && Notification.permission === 'granted') {
                    if ('serviceWorker' in navigator) {
                        navigator.serviceWorker.ready.then(reg => {
                            reg.showNotification('Новый заказ!', {
                                body: 'Поступил новый заказ',
                                icon: 'https://placehold.co/192x192/2D4A2E/FFFFFF?text=AB&font=playfair',
                                badge: 'https://placehold.co/192x192/2D4A2E/FFFFFF?text=AB&font=playfair',
                                vibrate: [200, 100, 200],
                                tag: 'new-order',
                                renotify: true,
                                requireInteraction: true,
                                data: { url: '/admin.html' }
                            });
                        });
                    }
                }
                renderOrders();
            }
            lastOrderCount = processingCount;
        }

        setInterval(checkNewOrders, 3000);

        function goToMain() {
            window.location.href = '/';
        }

        setTimeout(() => {
            const orders = getOrders();
            lastOrderCount = orders.filter(o => o.status === 'processing').length;
        }, 100);
    </script>

</body>
</html>
